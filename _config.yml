# Personal website — Jekyll config for GitHub Pages
title: John Brandon Elam
description: Make Decisions, Not Dashboards.
baseurl: ""
url: "https://johnbelam.com"
# Formspree form ID — get one at https://formspree.io (form emails you without exposing your address)
formspree_id: "xqeyekrr"
# Google Analytics 4 (gtag) — measurement ID from GA admin
google_analytics_id: "G-T5LQEGRZHE"
markdown: kramdown
highlighter: rouge
permalink: pretty

# Standalone mini-sites use *.html links; "pretty" would emit */index/ only and break those links.
defaults:
  - scope:
      path: "decision-gospel"
    values:
      permalink: /decision-gospel/:basename:output_ext
  - scope:
      path: "gaming-is-good"
    values:
      permalink: /gaming-is-good/:basename:output_ext
  - scope:
      path: "life-objective-function"
    values:
      permalink: /life-objective-function/:basename:output_ext

# GitHub Pages defaults
kramdown:
  input: GFM
  hard_wrap: false

# Collections (optional — for philosophy essays as a collection later)
# collections:
#   philosophy:
#     output: true
#     permalink: /philosophy/:path/

# Data files
# _data/books.yml
# _data/external_links.yml

# Build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - .git
  - .gitignore
  - Cursor Dump
  - run-local.ps1
  - serve.sh

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

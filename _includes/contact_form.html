{% assign formspree_id = site.formspree_id | default: "" | strip %}
{% if formspree_id != "" %}
<form class="contact-form" action="https://formspree.io/f/{{ formspree_id | url_encode }}" method="post" accept-charset="UTF-8">
  <label for="contact-company" style="position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden;">Leave this field empty</label>
  <input type="text" id="contact-company" name="_gotcha" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden;">
  <label for="contact-name">Name</label>
  <input type="text" id="contact-name" name="name" required autocomplete="name">
  <label for="contact-email">Your email</label>
  <input type="email" id="contact-email" name="email" required autocomplete="email">
  <label for="contact-subject">Subject</label>
  <input type="text" id="contact-subject" name="subject">
  <label for="contact-message">Message</label>
  <textarea id="contact-message" name="message" rows="5" required></textarea>
  <button type="submit" class="btn btn-primary">Send message</button>
</form>
{% else %}
<p class="contact-form-placeholder"><strong>Contact form:</strong> Add your <code>formspree_id</code> to <code>_config.yml</code> (get a free form at <a href="https://formspree.io" target="_blank" rel="noopener noreferrer">formspree.io</a> — messages will be emailed to you without exposing your address).</p>
{% endif %}

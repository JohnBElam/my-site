{% if site.formspree_id != nil and site.formspree_id != "" %}
<form class="contact-form" action="https://formspree.io/f/{{ site.formspree_id }}" method="post">
  <label for="contact-name">Name</label>
  <input type="text" id="contact-name" name="name" required>
  <label for="contact-email">Your email</label>
  <input type="email" id="contact-email" name="email" required>
  <label for="contact-subject">Subject</label>
  <input type="text" id="contact-subject" name="subject">
  <label for="contact-message">Message</label>
  <textarea id="contact-message" name="message" rows="5" required></textarea>
  <button type="submit" class="btn btn-primary">Send message</button>
</form>
{% else %}
<p class="contact-form-placeholder"><strong>Contact form:</strong> Add your <code>formspree_id</code> to <code>_config.yml</code> (get a free form at <a href="https://formspree.io" target="_blank" rel="noopener">formspree.io</a> — messages will be emailed to you without exposing your address).</p>
{% endif %}
